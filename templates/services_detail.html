{% extends "base.html" %}
{% block content %}
<h2>OUR SERVICES</h2>
<p class="text-muted mb-4">Click on any service to see full details</p>

<div class="services-accordion">
  {% for service in services %}
  <div class="service-item mb-3">
    <div class="service-header" data-bs-toggle="collapse" data-bs-target="#service-{{ service.id }}">
      <div class="service-header-content">
        <h5>{{ service.name }}</h5>
        <span class="service-meta">{{ service.duration }} • {{ service.price }}</span>
      </div>
      <span class="service-toggle">+</span>
    </div>
    <div class="collapse" id="service-{{ service.id }}">
      <div class="service-details">
        <p>{{ service.description }}</p>
        <a href="{{ url_for('book') }}" class="btn btn-book btn-sm">Book This Service</a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
